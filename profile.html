<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">
<div class="container mt-5">
  <div class="card p-4">
    <h3 class="text-center">Profile</h3>
    <!-- age input field -->
    <input type="number" id="age" class="form-control mb-2" placeholder="Age">
    <!-- date of birth input field -->
    <input type="date" id="dob" class="form-control mb-2">
    <!-- contact input field -->
    <input type="text" id="contact" class="form-control mb-3" placeholder="Contact">
    <!-- after button click js function calling -->
    <button class="btn btn-primary w-100" onclick="updateProfile()">Update</button>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="javascript/profile.js"></script>
</body>
</html>
