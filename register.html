<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">
<div class="container mt-5">
  <div class="card p-4">
    <h3 class="text-center">Register</h3>
    <!-- name input field -->
    <input type="text" id="name" class="form-control mb-2" placeholder="Name">
    <!-- email input field -->
    <input type="email" id="email" class="form-control mb-2" placeholder="Email">
    <!-- password input field -->
    <input type="password" id="password" class="form-control mb-3" placeholder="Password">
    <!-- after button click js function calling  -->
    <button class="btn btn-primary w-100" onclick="registerUser()">Register</button>

    <p class="mt-3 text-center">Already have account? <a href="login.html">Login</a></p>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="javascript/register.js"></script>
</body>
</html>
